services:
  buswatch:
    build:
      context: ../..
    restart: unless-stopped
    environment:
      PORT: "8080"
      SELF_URL: "https://${DOMAIN}"
      BMA_CAMERA_RELAY_URL: "${BMA_CAMERA_RELAY_URL:-https://raspberrypi.tailec6f8a.ts.net:8443}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - buswatch
    environment:
      DOMAIN: "${DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
